<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CyberSentinel - Database Records</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Fraunces:opsz,wght@9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg-app: #F2EDE4;
  --bg-sidebar: #2A1A12;
  --bg-card: #FFFDF9;
  --bg-element: #FAF7F2;
  --bg-hover: #E8DFD0;
  --border: #D8CFC4;
  --border-light: #E8E0D5;
  --text-primary: #2A1A12;
  --text-secondary: #5C4A3A;
  --text-muted: #9A8070;
  --accent: #C96A45;
  --accent-glow: rgba(201,106,69,0.25);
  --accent-gradient: linear-gradient(135deg, #C96A45, #E07B39);
  --danger: #C0392B; --warning: #D4881A; --success: #2D7A4A; --info: #2E6E8A;
  --danger-bg: #FEE8E5; --warning-bg: #FEF3DC;
  --success-bg: #E5F5EC; --info-bg: #E3EEF4;
  --radius: 12px; --radius-sm: 8px;
  --shadow: 0 4px 20px rgba(61,43,31,0.08);
  --glow: 0 4px 15px var(--accent-glow);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg-app);color:var(--text-primary);min-height:100vh}
.page{max-width:1200px;margin:0 auto;padding:24px;display:flex;flex-direction:column;gap:24px;}
.topbar{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;display:flex;align-items:center;justify-content:space-between;gap:16px;box-shadow:var(--shadow);flex-wrap:wrap;}
.title{font-family:'Fraunces',serif;font-size:24px;font-weight:700;color:var(--text-primary)}
.subtitle{font-size:13px;color:var(--text-muted);margin-top:4px}
.actions{display:flex;gap:12px;flex-wrap:wrap}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 20px;border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s;text-decoration:none;white-space:nowrap;}
.btn-primary{background:var(--accent-gradient);color:#fff;box-shadow:0 0 15px var(--accent-glow)}
.btn-primary:hover{opacity:0.9;transform:translateY(-1px);}
.btn-secondary{background:var(--bg-element);color:var(--text-primary);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--bg-hover);border-color:var(--border-light)}

.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);display:flex;flex-direction:column;overflow:hidden;}
.card-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;}
.card-title{font-family:'Fraunces',serif;font-size:18px;font-weight:700;color:var(--text-primary)}
.card-sub{font-size:13px;color:var(--text-muted);margin-top:4px;}
.card-body{padding:24px;overflow-x:auto;}

.pill{display:inline-flex;align-items:center;gap:6px;background:var(--success-bg);border:1px solid rgba(16,185,129,0.2);color:var(--success);font-size:11px;font-weight:700;padding:6px 12px;border-radius:20px}
.pill::before{content:'●';font-size:10px;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.tabs{display:flex;gap:4px;background:var(--bg-app);padding:4px;border-radius:10px;border:1px solid var(--border);overflow-x:auto;}
.tab{padding:8px 16px;border-radius:6px;font-size:13px;font-weight:600;color:var(--text-secondary);cursor:pointer;transition:all .2s;white-space:nowrap;}
.tab:hover{color:var(--text-primary);background:var(--bg-element)}
.tab.active{background:var(--bg-card);color:var(--accent);box-shadow:0 2px 8px rgba(61,43,31,0.06);border:1px solid var(--border)}

.tab-pane{display:none;animation:fadeIn .3s ease;}
.tab-pane.active{display:block;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

table{width:100%;border-collapse:collapse;font-size:13px;}
th{background:var(--bg-element);padding:14px;text-align:left;font-size:11px;font-weight:700;color:var(--text-secondary);letter-spacing:1px;text-transform:uppercase;border-bottom:2px solid var(--border);white-space:nowrap;}
td{padding:14px;border-bottom:1px solid var(--border);color:var(--text-primary);vertical-align:middle;}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg-hover)}
td.mono{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-muted)}

.empty-state{text-align:center;padding:40px;color:var(--text-muted);font-style:italic;}

::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--border-light)}

@media(max-width:768px){
  .topbar{flex-direction:column;align-items:flex-start;}
  .actions{width:100%;}
  .btn{flex:1;}
  .card-header{flex-direction:column;align-items:flex-start;}
  .tabs{width:100%;}
}
</style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <div class="title">Database Records</div>
        <div class="subtitle">Standalone view for SQLite data (cybersentinel.db)</div>
      </div>
      <div class="actions">
        <a class="btn btn-secondary" href="/">← Back to Dashboard</a>
        <button class="btn btn-primary" onclick="loadDbTable(activeTable)">Refresh</button>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <div>
          <div class="card-title" id="tableTitle">Complaints</div>
          <div class="card-sub">Switch tables to inspect records from backend APIs.</div>
        </div>
        <div class="pill" id="tableCount">-- records</div>
      </div>
      <div class="card-body">
        <div class="controls">
          <button class="btn btn-secondary" onclick="loadDbTable('complaints')">Complaints</button>
          <button class="btn btn-secondary" onclick="loadDbTable('incidents')">Incidents</button>
          <button class="btn btn-secondary" onclick="loadDbTable('threat_events')">Threat Events</button>
          <button class="btn btn-secondary" onclick="loadDbTable('iocs')">IOCs</button>
          <button class="btn btn-secondary" onclick="loadDbTable('activity')">Activity Log</button>
        </div>

        <div id="dbContent" class="msg">Loading records…</div>
      </div>
    </div>
  </div>

<script>
const API = 'http://localhost:5050';
let activeTable = 'complaints';

async function apiFetch(path, opts={}) {
  try {
    const r = await fetch(API + path, {
      headers: {'Content-Type':'application/json'},
      ...opts
    });
    return await r.json();
  } catch (e) {
    return null;
  }
}

async function loadDbTable(name) {
  activeTable = name;
  const content = document.getElementById('dbContent');
  const tableTitle = document.getElementById('tableTitle');
  const tableCount = document.getElementById('tableCount');

  tableTitle.textContent = name.replace('_', ' ').replace(/\b\w/g, c => c.toUpperCase());
  content.className = 'msg';
  content.textContent = 'Loading…';

  let d;
  if (name === 'complaints') d = await apiFetch('/api/complaints?per_page=100');
  else if (name === 'incidents') d = await apiFetch('/api/incidents?per_page=100');
  else if (name === 'threat_events') d = await apiFetch('/api/threat-events?per_page=100');
  else if (name === 'iocs') d = await apiFetch('/api/iocs');
  else if (name === 'activity') d = await apiFetch('/api/activity?limit=100');

  if (!d || !d.success) {
    tableCount.textContent = 'error';
    content.className = 'msg error';
    content.textContent = 'Failed to load data. Ensure server.py is running on port 5050.';
    return;
  }

  const rows = d.data.items || d.data;
  const total = d.data.total || rows.length;
  tableCount.textContent = `${total} records`;

  if (!rows.length) {
    content.className = 'msg';
    content.textContent = 'No records found.';
    return;
  }

  const cols = Object.keys(rows[0]);
  const priorityCols = {
    complaints: ['id','complaint_ref','complainant_name','complainant_phone','complainant_email','description','ai_category','ai_severity','status','created_at'],
    incidents: ['id','incident_ref','title','type','severity','status','source','assigned_name','created_at'],
    threat_events: ['id','event_type','severity','description','source_layer','source_ip','is_acknowledged','created_at'],
    iocs: ['id','ioc_type','value','confidence','threat_actor','notes','is_active'],
    activity: ['id','actor_label','action','entity_type','entity_id','detail','created_at']
  };

  const showCols = (priorityCols[name] || cols).filter(c => cols.includes(c));

  content.innerHTML = `
    <div class="small" style="margin-bottom:8px">Showing ${rows.length} rows</div>
    <div class="table-wrap">
      <table>
        <thead><tr>${showCols.map(c => `<th>${c}</th>`).join('')}</tr></thead>
        <tbody>
          ${rows.map(r => `<tr>${showCols.map(c => {
            const v = r[c];
            if (v === null || v === undefined) return '<td style="color:var(--text-light)">—</td>';
            const s = String(v);
            return `<td title="${s.replace(/"/g, '&quot;')}">${s.length > 80 ? s.substring(0, 80) + '…' : s}</td>`;
          }).join('')}</tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

loadDbTable('complaints');
</script>
</body>
</html>
